name: Build Images and Update Helm

on:
  push:
    branches:
      - main
    paths:
      - "src/cart/**"
      - "src/catalog/**"
      - "src/checkout/**"
      - "src/orders/**"
      - "src/ui/**"
      - ".github/workflows/deploy.yml"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect service changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          services=(cart catalog checkout orders ui)
          declare -A changed=()

          mark_all_services() {
            for service in "${services[@]}"; do
              changed["$service"]=1
            done
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mark_all_services
          else
            before="${{ github.event.before }}"

            if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]]; then
              before="$(git rev-list --max-parents=0 HEAD)"
            fi

            while IFS= read -r file; do
              case "$file" in
                ".github/workflows/deploy.yml")
                  mark_all_services
                  ;;
              esac

              for service in "${services[@]}"; do
                case "$file" in
                  "src/${service}/chart/"*)
                    ;;
                  "src/${service}/"*)
                    changed["$service"]=1
                    ;;
                esac
              done
            done < <(git diff --name-only "$before" "$GITHUB_SHA")
          fi

          json="["
          for service in "${services[@]}"; do
            if [[ "${changed[$service]:-}" == "1" ]]; then
              json+="\"$service\","
            fi
          done
          json="${json%,}]"

          echo "services=$json" >> "$GITHUB_OUTPUT"
          echo "Detected services: $json"

  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        env:
          ECR_REPOSITORY: retail-store-${{ matrix.service }}
        shell: bash
        run: |
          set -euo pipefail

          if ! aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "$ECR_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true >/dev/null
          fi

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: retail-store-${{ matrix.service }}
        shell: bash
        run: |
          set -euo pipefail

          image_tag="${GITHUB_SHA::7}"
          image_uri="$ECR_REGISTRY/$ECR_REPOSITORY:$image_tag"

          docker build --pull -t "$image_uri" "src/${{ matrix.service }}"
          docker push "$image_uri"

  update-helm-values:
    name: Update Helm values
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-and-push
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update chart values
        env:
          SERVICES_JSON: ${{ needs.detect-changes.outputs.services }}
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        shell: bash
        run: |
          set -euo pipefail

          image_tag="${GITHUB_SHA::7}"
          updated_files=()
          mapfile -t changed_services < <(python -c 'import json, os; print("\n".join(json.loads(os.environ["SERVICES_JSON"])))')

          for service in "${changed_services[@]}"; do
            values_file="src/${service}/chart/values.yaml"
            image_repository="$ECR_REGISTRY/retail-store-${service}"
            tmp_file="$(mktemp)"

            awk -v repo="$image_repository" -v tag="$image_tag" '
              /^image:[[:space:]]*$/ && !seen_main_image {
                in_main_image = 1
                seen_main_image = 1
                print
                next
              }
              in_main_image && /^[^[:space:]][^:]*:/ && $0 !~ /^image:/ {
                in_main_image = 0
              }
              in_main_image && /^[[:space:]]+repository:/ && !updated_repo {
                sub(/repository:.*/, "repository: " repo)
                updated_repo = 1
              }
              in_main_image && /^[[:space:]]+tag:/ && !updated_tag {
                sub(/tag:.*/, "tag: \"" tag "\"")
                updated_tag = 1
              }
              { print }
            ' "$values_file" > "$tmp_file"

            mv "$tmp_file" "$values_file"
            updated_files+=("$values_file")
            echo "Updated $values_file to $image_repository:$image_tag"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${updated_files[@]}"

          if git diff --cached --quiet; then
            echo "No Helm value changes to commit."
            exit 0
          fi

          git commit -m "chore: update image tags to ${image_tag}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
